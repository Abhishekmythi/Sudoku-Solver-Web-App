<!DOCTYPE html>
<html>
<head>
<title>Sudoku Solver</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

h1{
margin-top:20px;
color:#38bdf8;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

td{
border:2px solid white;
}

input{
width:45px;
height:45px;
text-align:center;
font-size:20px;
border:none;
outline:none;
background:#1e293b;
color:white;
transition:0.3s;
}

/* Hover Effect */

td:hover input{
background:#334155;
transform:scale(1.1);
}

/* Different number colors */

input[value="1"]{color:#ef4444;}
input[value="2"]{color:#f97316;}
input[value="3"]{color:#eab308;}
input[value="4"]{color:#22c55e;}
input[value="5"]{color:#06b6d4;}
input[value="6"]{color:#3b82f6;}
input[value="7"]{color:#8b5cf6;}
input[value="8"]{color:#ec4899;}
input[value="9"]{color:#f43f5e;}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
background:#38bdf8;
color:black;
border:none;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<h1>Sudoku Solver (DSA - Backtracking)</h1>

<table id="sudoku"></table>

<button onclick="solveSudoku()">Solve</button>
<button onclick="clearBoard()">Clear</button>

<script>

let table=document.getElementById("sudoku");

for(let r=0;r<9;r++)
{
let row=document.createElement("tr");

for(let c=0;c<9;c++)
{
let cell=document.createElement("td");

let input=document.createElement("input");
input.maxLength=1;

input.addEventListener("input",()=>{
updateColors();
});

cell.appendChild(input);
row.appendChild(cell);
}

table.appendChild(row);
}

function updateColors(){

for(let r=0;r<9;r++)
{
for(let c=0;c<9;c++)
{
let input=table.rows[r].cells[c].firstChild;
let v=input.value;

input.style.color="white";

if(v==1) input.style.color="#ef4444";
if(v==2) input.style.color="#f97316";
if(v==3) input.style.color="#eab308";
if(v==4) input.style.color="#22c55e";
if(v==5) input.style.color="#06b6d4";
if(v==6) input.style.color="#3b82f6";
if(v==7) input.style.color="#8b5cf6";
if(v==8) input.style.color="#ec4899";
if(v==9) input.style.color="#f43f5e";
}
}

}

function getBoard()
{
let board=[];

for(let r=0;r<9;r++)
{
board[r]=[];

for(let c=0;c<9;c++)
{
let val=table.rows[r].cells[c].firstChild.value;
board[r][c]=val?parseInt(val):0;
}
}

return board;
}

function setBoard(board)
{
for(let r=0;r<9;r++)
{
for(let c=0;c<9;c++)
{
table.rows[r].cells[c].firstChild.value=board[r][c];
}
}
updateColors();
}

function isSafe(board,row,col,num)
{
for(let x=0;x<9;x++)
if(board[row][x]==num) return false;

for(let x=0;x<9;x++)
if(board[x][col]==num) return false;

let startRow=row-row%3;
let startCol=col-col%3;

for(let r=0;r<3;r++)
for(let c=0;c<3;c++)
if(board[startRow+r][startCol+c]==num)
return false;

return true;
}

function solve(board)
{
for(let r=0;r<9;r++)
{
for(let c=0;c<9;c++)
{
if(board[r][c]==0)
{
for(let num=1;num<=9;num++)
{
if(isSafe(board,r,c,num))
{
board[r][c]=num;

if(solve(board))
return true;

board[r][c]=0;
}
}

return false;
}
}
}

return true;
}

function solveSudoku()
{
let board=getBoard();

if(solve(board))
setBoard(board);
else
alert("No solution exists");
}

function clearBoard()
{
for(let r=0;r<9;r++)
for(let c=0;c<9;c++)
table.rows[r].cells[c].firstChild.value="";
}

</script>

</body>
</html>
